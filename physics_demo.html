<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== 全局状态 ========== 
const C=window.CANNON,container=document.getElementById('canvas-container');
const TOTAL_TIME=30;let isPaused=false,timeScale=1,controlMode='auto';
let animStartTime=performance.now(),bucketUp=false,bucketAngle=0;
let loaderAngle=0,loaderPosX=-9,loaderPosZ=0;
const prevLoaderPos=new THREE.Vector3(-9,0,0);let lastMoveTime=performance.now();let cameraPreset=0;const keys={};
let mediaRecorder=null,recordedChunks=[],isRecording=false,recordStartTime=0;

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  // 对所有移动键阻止默认行为（防止页面滚动等干扰）
  if(['KeyW','KeyS','KeyA','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)){
    e.preventDefault();e.stopPropagation();
  }
  if(e.code==='Space')bucketUp=!bucketUp;
  if(e.code==='Digit1')setCameraPreset(1);
  if(e.code==='Digit2')setCameraPreset(2);
  if(e.code==='Digit3')setCameraPreset(3);
},{capture:true});
window.addEventListener('keyup',e=>{keys[e.code]=false;},{capture:true});
// 防止失焦时按键卡住
window.addEventListener('blur',()=>{Object.keys(keys).forEach(k=>keys[k]=false);});

// ========== Three.js 初始化 ========== 
const scene=new THREE.Scene();
// 渐变天空背景
const skyCanvas=document.createElement('canvas');skyCanvas.width=2;skyCanvas.height=256;
const skyCtx=skyCanvas.getContext('2d');
const skyGrad=skyCtx.createLinearGradient(0,0,0,256);
skyGrad.addColorStop(0,'#1e90ff');skyGrad.addColorStop(0.5,'#87ceeb');skyGrad.addColorStop(1,'#f0f8ff');
skyCtx.fillStyle=skyGrad;skyCtx.fillRect(0,0,2,256);
scene.background=new THREE.CanvasTexture(skyCanvas);
scene.fog=new THREE.Fog(0x87ceeb,30,80);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,300);
camera.position.set(0,6,14);
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(1);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.BasicShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.3;
container.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.08;
controls.mouseButtons={LEFT:null,MIDDLE:THREE.MOUSE.DOLLY,RIGHT:THREE.MOUSE.ROTATE};
controls.enabled=false;controls.target.set(0,0,0);
// 禁用 OrbitControls 键盘功能，防止拦截移动键
controls.enableKeys=false;
try{if(controls.listenToKeyEvents)controls.listenToKeyEvents(undefined);}catch(e){}

// ========== 光照 ========== 
const hemiLight=new THREE.HemisphereLight(0x87CEEB,0x6B5B3A,0.5);scene.add(hemiLight);
const ambientLight=new THREE.AmbientLight(0xfff5e0,0.55);scene.add(ambientLight);
const dirLight=new THREE.DirectionalLight(0xfff5e6,1.2);
dirLight.position.set(10,15,8);dirLight.castShadow=true;
dirLight.shadow.mapSize.set(512,512);dirLight.shadow.camera.near=0.5;dirLight.shadow.camera.far=50;
dirLight.shadow.camera.left=-25;dirLight.shadow.camera.right=25;
dirLight.shadow.camera.top=15;dirLight.shadow.camera.bottom=-5;
scene.add(dirLight);
const fillLight=new THREE.DirectionalLight(0x6080a0,0.4);fillLight.position.set(-5,4,-5);scene.add(fillLight);
const workLight=new THREE.PointLight(0xfff5e0,0.8,15,2);scene.add(workLight);

// ========== 渐变天空背景（轻量方式） ==========

// ========== 程序化纹理生成 ========== 
function noiseCanvas(w,h,bR,bG,bB,amt,patches){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;const cx=cv.getContext('2d');
  cx.fillStyle=`rgb(${bR},${bG},${bB})`;cx.fillRect(0,0,w,h);
  for(let i=0;i<patches;i++){const px=Math.random()*w,py=Math.random()*h,pr=4+Math.random()*18;
    const dr=(Math.random()-0.5)*amt*2.5,dg=(Math.random()-0.5)*amt*2.5,db=(Math.random()-0.5)*amt*2.5;
    cx.fillStyle=`rgba(${Math.min(255,Math.max(0,bR+dr))|0},${Math.min(255,Math.max(0,bG+dg))|0},${Math.min(255,Math.max(0,bB+db))|0},0.45)`;
    cx.beginPath();cx.arc(px,py,pr,0,Math.PI*2);cx.fill();}
  const img=cx.getImageData(0,0,w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*amt;d[i]=Math.min(255,Math.max(0,d[i]+n));d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));}
  cx.putImageData(img,0,0);return cv;
}

function asphaltCanvas(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;const cx=cv.getContext('2d');
  cx.fillStyle='#3a3a3a';cx.fillRect(0,0,w,h);
  // 沥青颗粒噪点
  const img=cx.getImageData(0,0,w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*20;d[i]=Math.min(255,Math.max(0,d[i]+n));d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));}
  cx.putImageData(img,0,0);
  // 路面裂纹
  for(let i=0;i<6;i++){cx.strokeStyle=`rgba(25,25,25,${0.3+Math.random()*0.4})`;cx.lineWidth=0.5+Math.random()*1.5;
    cx.beginPath();let px=Math.random()*w,py=Math.random()*h;cx.moveTo(px,py);
    for(let j=0;j<3+Math.random()*5;j++){px+=(Math.random()-0.5)*15;py+=(Math.random()-0.5)*15;cx.lineTo(px,py);}cx.stroke();}
  // 修补痕迹
  for(let i=0;i<4;i++){cx.fillStyle=`rgba(${45+Math.random()*15},${45+Math.random()*15},${40+Math.random()*15},0.35)`;
    cx.fillRect(Math.random()*w,Math.random()*h,8+Math.random()*25,4+Math.random()*10);}
  return cv;
}

function grassCanvas(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;const cx=cv.getContext('2d');
  cx.fillStyle='#3a7a2a';cx.fillRect(0,0,w,h);
  for(let i=0;i<500;i++){const gx=Math.random()*w,gy=Math.random()*h;
    cx.strokeStyle=`rgba(${30+Math.random()*40},${70+Math.random()*50},${20+Math.random()*30},0.6)`;
    cx.lineWidth=0.5+Math.random()*1;cx.beginPath();cx.moveTo(gx,gy);cx.lineTo(gx+(Math.random()-0.5)*3,gy-2-Math.random()*4);cx.stroke();}
  const img=cx.getImageData(0,0,w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*15;d[i]=Math.min(255,Math.max(0,d[i]+n));d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));}
  cx.putImageData(img,0,0);return cv;
}

function rockWallCanvas(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;const cx=cv.getContext('2d');
  cx.fillStyle='#5a4a3a';cx.fillRect(0,0,w,h);
  // 分层岩石色带
  for(let i=0;i<8;i++){const y=i*h/8;cx.fillStyle=`rgba(${70+Math.random()*30},${50+Math.random()*25},${35+Math.random()*20},0.4)`;
    cx.fillRect(0,y,w,h/8+Math.random()*10);}
  // 裂缝
  for(let i=0;i<10;i++){cx.strokeStyle=`rgba(30,20,10,${0.4+Math.random()*0.3})`;cx.lineWidth=1+Math.random()*2;
    cx.beginPath();let px=Math.random()*w;cx.moveTo(px,0);
    for(let j=0;j<8;j++){px+=(Math.random()-0.5)*20;cx.lineTo(px,j*h/8+Math.random()*10);}cx.stroke();}
  const img=cx.getImageData(0,0,w,h),d=img.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-0.5)*25;d[i]=Math.min(255,Math.max(0,d[i]+n));d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));}
  cx.putImageData(img,0,0);return cv;
}

function loaderLabelCanvas(text){
  const cv=document.createElement('canvas');cv.width=128;cv.height=64;const cx=cv.getContext('2d');
  cx.fillStyle='#F5A623';cx.fillRect(0,0,128,64);
  cx.font='bold 28px sans-serif';cx.fillStyle='#1a1a1a';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(text,64,32);return cv;
}

const asphaltTex=new THREE.CanvasTexture(asphaltCanvas(256,256));
asphaltTex.wrapS=asphaltTex.wrapT=THREE.RepeatWrapping;asphaltTex.repeat.set(4,2);

const grassTex=new THREE.CanvasTexture(grassCanvas(256,256));
grassTex.wrapS=grassTex.wrapT=THREE.RepeatWrapping;grassTex.repeat.set(8,6);

const rockWallTex=new THREE.CanvasTexture(rockWallCanvas(256,256));
rockWallTex.wrapS=rockWallTex.wrapT=THREE.RepeatWrapping;rockWallTex.repeat.set(2,2);

const rockTex=new THREE.CanvasTexture(noiseCanvas(128,128,120,90,60,35,90));
rockTex.wrapS=rockTex.wrapT=THREE.RepeatWrapping;

const shoulderTex=new THREE.CanvasTexture(noiseCanvas(128,128,140,130,110,20,60));
shoulderTex.wrapS=shoulderTex.wrapT=THREE.RepeatWrapping;

const dirtTex=new THREE.CanvasTexture(noiseCanvas(128,128,70,55,35,18,80));
dirtTex.wrapS=dirtTex.wrapT=THREE.RepeatWrapping;dirtTex.repeat.set(4,2);

// ========== 道路曲线 ========== 
const roadCurve=new THREE.CatmullRomCurve3([
  new THREE.Vector3(-20,0,1.5),new THREE.Vector3(-14,0,1.2),new THREE.Vector3(-5,0,0.2),
  new THREE.Vector3(3,0,-0.6),new THREE.Vector3(10,0,0.3),new THREE.Vector3(14,0,0.8),new THREE.Vector3(20,0,1.0)
]);
const ROAD_W=11,ROAD_SEG=30;
const roadGroup=new THREE.Group();scene.add(roadGroup);
const asphaltMat=new THREE.MeshStandardMaterial({map:asphaltTex,color:0x3a3a3a,roughness:0.9,metalness:0.05,emissive:0x222222,emissiveIntensity:0.1});

// 道路面：沿曲线创建ribbon mesh
function makeRoadRibbon(curve,width,segs,yOff,mat){
  const grp=new THREE.Group();
  const pts=curve.getSpacedPoints(segs);const up=new THREE.Vector3(0,1,0);
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1],mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
    const len=p1.distanceTo(p2),t1=i/segs;
    const tan=curve.getTangentAt(Math.min(t1,0.999));
    const ang=Math.atan2(tan.z,tan.x);
    const seg=new THREE.Mesh(new THREE.BoxGeometry(len+0.02,0.15,width),mat);
    seg.position.set(mid.x,mid.y+yOff,mid.z);seg.rotation.y=-ang;
    seg.receiveShadow=true;seg.castShadow=false;grp.add(seg);
  }
  return grp;
}
roadGroup.add(makeRoadRibbon(roadCurve,ROAD_W,ROAD_SEG,0,asphaltMat));

// 路面标线
const lineWMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3,emissive:0xffffff,emissiveIntensity:0.6});
const yellowLineMat=new THREE.MeshStandardMaterial({color:0xffd700,roughness:0.3,emissive:0xffd700,emissiveIntensity:0.5});
const edgeWMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.4,emissive:0xffffff,emissiveIntensity:0.6});

// 黄色双实线（对向分隔）
for(let i=0;i<ROAD_SEG;i++){
  const t=i/ROAD_SEG,t2=(i+1)/ROAD_SEG;
  const p1=roadCurve.getPointAt(t),p2=roadCurve.getPointAt(Math.min(t2,0.999));
  const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
  const len=p1.distanceTo(p2),tan=roadCurve.getTangentAt(Math.min(t,0.999));
  const ang=Math.atan2(tan.z,tan.x);
  [-0.2,0.2].forEach(off=>{
    const ln=new THREE.Mesh(new THREE.BoxGeometry(len,0.01,0.24),yellowLineMat);
    ln.position.set(mid.x,0.08,mid.z+off*Math.cos(ang)-off*0*Math.sin(ang));
    ln.rotation.y=-ang;roadGroup.add(ln);
  });
}

// 白色虚线中心线
for(let i=0;i<ROAD_SEG;i+=2){
  const t=i/ROAD_SEG;
  const p=roadCurve.getPointAt(t),tan=roadCurve.getTangentAt(Math.min(t,0.999));
  const ang=Math.atan2(tan.z,tan.x);
  const ln=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.01,0.28),lineWMat);
  ln.position.set(p.x,0.085,p.z);ln.rotation.y=-ang;roadGroup.add(ln);
}

// 白色实线边线（两侧）
[-ROAD_W/2+0.3,ROAD_W/2-0.3].forEach(sideOff=>{
  for(let i=0;i<ROAD_SEG;i++){
    const t=i/ROAD_SEG,t2=(i+1)/ROAD_SEG;
    const p1=roadCurve.getPointAt(t),p2=roadCurve.getPointAt(Math.min(t2,0.999));
    const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
    const len=p1.distanceTo(p2),tan=roadCurve.getTangentAt(Math.min(t,0.999));

function addGuardrail(curve,side,len){
  const step=3.5;

    const t=(d+len)/(2*len);if(t<0||t>1)continue;
    const p=curve.getPointAt(t),tan=curve.getTangentAt(t);
    const ang=Math.atan2(tan.z,tan.x),norm=new THREE.Vector3(-Math.sin(ang),0,Math.cos(ang));

    post.position.set(p.x+norm.x*off,0.4,p.z+norm.z*off);scene.add(post);
    // 横杆
    const bar=new THREE.Mesh(new THREE.BoxGeometry(step,0.06,0.06),railBarMat);
    bar.position.set(p.x+norm.x*off+tan.x*step/2,0.6,p.z+norm.z*off+tan.z*step/2);
    bar.rotation.y=-ang;scene.add(bar);
  }
}

const rockColors=[0x8B7355,0xA0522D,0x8B4513,0x5D4C3A,0x7A6A5A,0x6B5B4F,0x9E8B7D,0x8C7B6B,0x6B4423,0x7A6A4A,0x5A4A3A,0x9A8A6A,0x4A3A2A,0xB09A7A,0x887766,0x554433,0x7B6B4B,0x6A5A3A,0x8A7A5A,0x9C8C6C];

function createRock(i){
  const radius=0.12+Math.random()*0.55;
  const isSphere=Math.random()>0.35;
  let geo,shape;
  if(isSphere){geo=new THREE.SphereGeometry(radius,6,5);shape=new C.Sphere(radius);}
  else{
    geo=new THREE.DodecahedronGeometry(radius,0);
    // 随机变形使碎石更不规则
    const pos=geo.attributes.position;
    for(let j=0;j<pos.count;j++){pos.setX(j,pos.getX(j)+(Math.random()-0.5)*radius*0.3);pos.setY(j,pos.getY(j)+(Math.random()-0.5)*radius*0.25);pos.setZ(j,pos.getZ(j)+(Math.random()-0.5)*radius*0.3);}
    geo.computeVertexNormals();shape=new C.Sphere(radius*0.85);
  }
  const rTex=rockTex;
  const color=rockColors[Math.floor(Math.random()*rockColors.length)];
  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({map:rTex,color,roughness:0.85+Math.random()*0.15,metalness:0.05}));
  mesh.castShadow=radius>0.35;mesh.receiveShadow=true;scene.add(mesh);
  const mass=0.5+Math.random()*3;
  const body=new C.Body({mass,material:rockMat});body.originalMass=mass;body.addShape(shape);
  // 锥形堆积：从边坡方向滑落的感觉（z偏负 = 朝道路中间偏移）
  const cols=8;const gridX=Math.floor(i/cols);const gridZ=i%cols;
  const rx=-3.5+gridX*1.0+(Math.random()-0.5)*0.4;
  const rz=-2.0+gridZ*0.4+(Math.random()-0.5)*0.2; // 偏向边坡侧(负z)
  const baseY=getRoadSurfaceY(rx)+radius+0.08;
  const stackY=gridX*0.22; // 堆积高度递减
  body.position.set(rx,baseY+stackY,rz);
  body.linearDamping=0.15;body.angularDamping=0.15;
  body.quaternion.setFromEuler(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
  world.addBody(body);physBodies.push(body);visualMeshes.push(mesh);
}

const blade=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.12,1.85),new THREE.MeshStandardMaterial({color:0x475569,roughness:0.3,metalness:0.7}));
blade.position.set(3.33,-0.55,0);blade.castShadow=true;bucketAssembly.add(blade);

// 铲车物理体
const loaderBody=new C.Body({mass:0,material:defMat});
loaderBody.type=C.Body.KINEMATIC;
loaderBody.addShape(new C.Box(new C.Vec3(1.2,0.45,0.75)),new C.Vec3(0,0.75,0));
loaderBody.addShape(new C.Box(new C.Vec3(0.45,0.425,0.6)),new C.Vec3(-0.5,1.55,0));
loaderBody.addShape(new C.Box(new C.Vec3(0.5,0.5,1.0)),new C.Vec3(3.6,0.1,0));
loaderBody.addShape(new C.Box(new C.Vec3(0.4,0.45,1.0)),new C.Vec3(3.4,0.8,0));
world.addBody(loaderBody);physBodies.push(loaderBody);visualMeshes.push(loaderGroup);

const loaderStartX=-9,loaderEndX=7;
loaderBody.position.set(loaderStartX,getLoaderY(loaderStartX),0);
loaderGroup.position.copy(loaderBody.position);loaderGroup.quaternion.copy(loaderBody.quaternion);

// 接触阴影
const contactShadow=new THREE.Mesh(new THREE.CircleGeometry(1.8,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.25,depthWrite:false}));
contactShadow.rotation.x=-Math.PI/2;scene.add(contactShadow);

// ========== 粒子系统已删除（提升帧率） ========== 
function emitDust(){/* no-op */}
function emitSparks(){/* no-op */}
function updateParticles(){/* no-op */}

// ========== 排烟效果已删除（提升帧率） ========== 
function emitExhaustSmoke(){/* no-op */}
function updateSmokePuffs(){/* no-op */}

// ========== 预模拟 - 让碎石自然堆积 ========== 
const settledPositions=[],settledQuaternions=[];
for(let step=0;step<240;step++)world.step(1/60);
for(let i=0;i<rockCount;i++){
  const b=physBodies[i];
  settledPositions.push(new C.Vec3(b.position.x,b.position.y,b.position.z));
  settledQuaternions.push(new C.Quaternion(b.quaternion.x,b.quaternion.y,b.quaternion.z,b.quaternion.w));
  b.velocity.set(0,0,0);b.angularVelocity.set(0,0,0);b.type=C.Body.STATIC;
  syncMeshToBody(visualMeshes[i],b);
}
let rocksFrozen=true;
function unfreezeRocks(){if(!rocksFrozen)return;rocksFrozen=false;for(let i=0;i<rockCount;i++){const b=physBodies[i];b.type=C.Body.DYNAMIC;b.mass=b.originalMass||1;b.updateMassProperties();b.wakeUp();}}

// ========== 警示灯闪烁 ========== 
let warnLightTimer=0;

// ========== 自动模式相机状态 ========== 
function getCameraState(t){
  if(t<3){const p=t/3,e=1-Math.pow(1-p,3);return{pos:new THREE.Vector3(e,6-e*3,14-e*7),lookAt:new THREE.Vector3(0,e*0.5,0),phase:'场景展示',label:'碎石堆积场景'};}
  else if(t<5){const lx=loaderStartX+2.5*(t-3);return{pos:new THREE.Vector3(lx-4,3.5,8),lookAt:new THREE.Vector3(lx+3,0.5,0),phase:'铲车启动',label:'铲车启动靠近'};}
  else if(t<22){const lx=-6.5+0.75*(t-4);return{pos:new THREE.Vector3(lx-4,3,7),lookAt:new THREE.Vector3(lx+3,0.5,0),phase:'铲斗推石',label:'铲斗推石清障'};}
  else if(t<25){return{pos:new THREE.Vector3(3,3.5,7),lookAt:new THREE.Vector3(5,0.5,0),phase:'减速停止',label:'减速停止'};}
  else if(t<30){const p=(t-25)/5,a=p*Math.PI*0.8,r=10;return{pos:new THREE.Vector3(Math.sin(a)*r,4+Math.sin(a*2),Math.cos(a)*r),lookAt:new THREE.Vector3(3,0,0),phase:'展示效果',label:'清理效果展示'};}
  return{pos:new THREE.Vector3(0,5,10),lookAt:new THREE.Vector3(0,0,0),phase:'完成',label:'模拟完成'};
}
function setCameraPreset(n){if(controlMode==='auto')return;cameraPreset=n;controls.enabled=true;if(n===1){camera.position.set(loaderPosX,15,loaderPosZ+0.1);controls.target.set(loaderPosX,0,loaderPosZ);}else if(n===3){camera.position.set(loaderPosX,3,loaderPosZ+15);controls.target.set(loaderPosX,0,loaderPosZ);}controls.update();updateHintBar();}

// ========== UI ========== 
const fpsEl=document.getElementById('fpsVal'),bodyEl=document.getElementById('bodyVal');
const recEl=document.getElementById('recVal'),phaseHint=document.getElementById('phaseHint');
const phaseLabel=document.getElementById('phaseLabel'),progressFill=document.getElementById('progressFill');
const progressTime=document.getElementById('progressTime'),modeValEl=document.getElementById('modeVal');
const modeTag=document.getElementById('modeTag'),hintText=document.getElementById('hintText');
let lastFpsTime=performance.now(),frameCount=0,currentFps=0,lastPhase='';
function updateHintBar(){if(controlMode==='auto'){modeTag.textContent='自动演示';hintText.innerHTML='自动播放中 · 右键旋转视角';}else{const presetNames={0:'自由',1:'俯瞰',2:'跟随',3:'侧面'};modeTag.textContent='手动操控';hintText.innerHTML=`<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 · <kbd>空格</kbd> 升降铲斗 · <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 视角(${presetNames[cameraPreset]||'自由'}) · 右键旋转`;}}
function updateModeUI(){modeValEl.textContent=controlMode==='auto'?'自动演示':'手动操控';document.getElementById('btnAuto').classList.toggle('active',controlMode==='auto');document.getElementById('btnManual').classList.toggle('active',controlMode==='manual');controls.enabled=controlMode==='manual';updateHintBar();}
function updateUI(t){frameCount++;const now=performance.now();if(now-lastFpsTime>=500){currentFps=Math.round(frameCount/((now-lastFpsTime)/1000));frameCount=0;lastFpsTime=now;fpsEl.textContent=currentFps;bodyEl.textContent=world.bodies.length;}if(controlMode==='auto'){const pct=Math.min(t/TOTAL_TIME*100,100);progressFill.style.width=pct+'%';progressTime.textContent=t.toFixed(1)+'s / '+TOTAL_TIME+'s';const state=getCameraState(t);phaseLabel.textContent=state.label;if(state.phase!==lastPhase){lastPhase=state.phase;phaseHint.textContent=state.phase;phaseHint.classList.add('show');setTimeout(()=>phaseHint.classList.remove('show'),2000);}}else{progressFill.style.width='100%';progressTime.textContent='手动操控';phaseLabel.textContent='手动操控中';}if(isRecording)recEl.textContent='录制中 '+((performance.now()-recordStartTime)/1000).toFixed(1)+'s';}

// ========== 录制 ========== 
const btnRecord=document.getElementById('btnRecord'),btnRecordText=document.getElementById('btnRecordText');
btnRecord.addEventListener('click',()=>{isRecording?stopRecording():startRecording();});
function startRecording(){try{const stream=renderer.domElement.captureStream(30);let mime='video/webm;codecs=vp9';if(!MediaRecorder.isTypeSupported(mime)){mime='video/webm;codecs=vp8';if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';}mediaRecorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});recordedChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};mediaRecorder.onstop=()=>{try{const blob=new Blob(recordedChunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='山区公路滑坡抢险_'+new Date().toLocaleString().replace(/[/:]/g,'-')+'.webm';a.click();URL.revokeObjectURL(a.href);recEl.textContent='已保存';}catch(err){recEl.textContent='保存失败';}setTimeout(()=>{if(!isRecording)recEl.textContent='待机';},3000);};mediaRecorder.onerror=()=>{recEl.textContent='录制出错';stopRecording();};mediaRecorder.start(100);isRecording=true;recordStartTime=performance.now();btnRecord.classList.add('recording');btnRecordText.textContent='停止录制';recEl.textContent='录制中...';}catch(err){alert('浏览器不支持视频录制');}}
function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();isRecording=false;btnRecord.classList.remove('recording');btnRecordText.textContent='录制视频';}

// ========== 控制面板 ========== 
document.getElementById('btnPause').addEventListener('click',()=>{isPaused=!isPaused;document.getElementById('btnPause').textContent=isPaused?'▶ 继续':'⏸ 暂停';});
document.getElementById('btnReset').addEventListener('click',()=>{resetScene();isPaused=false;document.getElementById('btnPause').textContent='⏸ 暂停';});
document.getElementById('speed05').addEventListener('click',()=>setSpeed(0.5));
document.getElementById('speed1').addEventListener('click',()=>setSpeed(1));
document.getElementById('speed2').addEventListener('click',()=>setSpeed(2));
function setSpeed(s){timeScale=s;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));document.getElementById('speed'+(s===0.5?'05':s)).classList.add('active');}
document.getElementById('btnAuto').addEventListener('click',()=>{controlMode='auto';cameraPreset=0;animStartTime=performance.now();resetScene();updateModeUI();});
document.getElementById('btnManual').addEventListener('click',()=>{controlMode='manual';cameraPreset=2;unfreezeRocks();loaderPosX=loaderGroup.position.x;loaderPosZ=loaderGroup.position.z;loaderAngle=loaderGroup.rotation.y;lastMoveTime=performance.now();controls.enabled=true;updateModeUI();camera.position.set(loaderPosX-5,4,loaderPosZ+5);controls.target.set(loaderPosX,1,loaderPosZ);});

function resetScene(){physicsAccumulator=0;animStartTime=performance.now();lastMoveTime=performance.now();rocksFrozen=true;for(let i=0;i<rockCount;i++){const body=physBodies[i],mesh=visualMeshes[i];body.position.copy(settledPositions[i]);body.quaternion.copy(settledQuaternions[i]);body.velocity.set(0,0,0);body.angularVelocity.set(0,0,0);body.type=C.Body.STATIC;syncMeshToBody(mesh,body);}loaderPosX=loaderStartX;loaderPosZ=0;loaderAngle=0;bucketUp=false;bucketAngle=0;bucketAssembly.rotation.z=0;loaderBody.position.set(loaderStartX,getLoaderY(loaderStartX),0);loaderBody.velocity.set(0,0,0);loaderBody.angularVelocity.set(0,0,0);loaderBody.quaternion.set(0,0,0,1);loaderGroup.position.copy(loaderBody.position);loaderGroup.quaternion.copy(loaderBody.quaternion);prevLoaderPos.set(loaderBody.position.x,loaderBody.position.y,loaderBody.position.z);}

// ========== 主动画循环 ========== 
const clock=new THREE.Clock();const fixedDt=1/60;let exhaustTimer=0;
let physicsAccumulator=0;
const _tmpVec=new THREE.Vector3(),_tmpVec2=new THREE.Vector3(),_tmpVec3=new THREE.Vector3();
function animate(){
  requestAnimationFrame(animate);
  const rawDt=Math.min(clock.getDelta(),0.05);
  if(isPaused){const wasEn=controls.enabled;controls.enabled=true;controls.update();controls.enabled=wasEn;renderer.render(scene,camera);return;}
  const dt=Math.min(rawDt*timeScale,1/30);
  let t=0,loaderMoving=false;

  // ====================================================================
  // 铲车移动（最先执行，唯一写入 loaderGroup 位置的代码段）
  // 原则：手动模式用 performance.now() 真实帧间隔驱动，消除帧率波动导致的突进
  // ====================================================================
  if(controlMode==='auto'){
    t=(performance.now()-animStartTime)/1000;if(t>=TOTAL_TIME){t=TOTAL_TIME;isPaused=true;phaseLabel.textContent='模拟完成';}
    if(t>3&&rocksFrozen)unfreezeRocks();
    // 自动模式：dt驱动，保证与相机时间轴同步
    if(t>3&&t<=4){loaderGroup.translateX(2.5*dt);loaderMoving=true;}
    else if(t>4&&t<=22){if(loaderGroup.position.x<loaderEndX){loaderGroup.translateX(0.75*dt);loaderMoving=true;}}
    loaderGroup.position.y=getLoaderY(loaderGroup.position.x);
  }else{
    // 手动模式：使用 performance.now() 计算真实帧间隔，保证匀速移动
    const now=performance.now();
    const moveDt=(now-lastMoveTime)/1000;
    lastMoveTime=now;
    const clampedMoveDt=Math.min(Math.max(moveDt,0.008),0.033); // 30~120fps范围
    const MOVE_SPEED=3.0,TURN_SPEED=1.5;
    const fwd=keys['KeyW']||keys['ArrowUp'],bwd=keys['KeyS']||keys['ArrowDown'];
    const left=keys['KeyA']||keys['ArrowLeft'],right=keys['KeyD']||keys['ArrowRight'];
    if(fwd){loaderGroup.translateX(MOVE_SPEED*clampedMoveDt);loaderMoving=true;}
    if(bwd){loaderGroup.translateX(-MOVE_SPEED*clampedMoveDt*0.6);loaderMoving=true;}
    if(left)loaderGroup.rotation.y+=TURN_SPEED*clampedMoveDt;
    if(right)loaderGroup.rotation.y-=TURN_SPEED*clampedMoveDt;
    loaderGroup.position.x=Math.max(-20,Math.min(20,loaderGroup.position.x));
    loaderGroup.position.z=Math.max(-8.0,Math.min(8.0,loaderGroup.position.z));
    loaderGroup.position.y=getLoaderY(loaderGroup.position.x);
  }
  const loaderTargetX=loaderGroup.position.x,loaderTargetZ=loaderGroup.position.z;
  loaderPosX=loaderTargetX;loaderPosZ=loaderTargetZ;loaderAngle=loaderGroup.rotation.y;

  // ====================================================================
  // 同步物理体（单向：mesh → body，绝不从 loaderBody 回读位置）
  // ====================================================================
  loaderBody.position.set(loaderGroup.position.x,loaderGroup.position.y,loaderGroup.position.z);
  loaderBody.quaternion.set(loaderGroup.quaternion.x,loaderGroup.quaternion.y,loaderGroup.quaternion.z,loaderGroup.quaternion.w);
  loaderBody.velocity.set(0,0,0);
  loaderBody.angularVelocity.set(0,0,0);

  // ====================================================================
  // 物理步进（仅影响碎石，铲车是 kinematic body 不受物理驱动）
  // ====================================================================
  physicsAccumulator+=dt;
  let subSteps=0;
  while(physicsAccumulator>=fixedDt&&subSteps<5){world.step(fixedDt);physicsAccumulator-=fixedDt;subSteps++;}
  if(physicsAccumulator>fixedDt*2)physicsAccumulator=0;

  // ====================================================================
  // 以下绝对不能有任何代码从 loaderBody 读取位置写回 loaderGroup
  // ====================================================================

  // 铲斗动画
  let targetBA;if(controlMode==='auto'){if(t<3)targetBA=0;else if(t<4)targetBA=-0.15;else if(t<25)targetBA=-0.15;else targetBA=1.2;}else{targetBA=bucketUp?1.2:-0.15;}
  bucketAngle+=(targetBA-bucketAngle)*0.08;bucketAssembly.rotation.z=bucketAngle;

  // 轮子旋转（基于实际位移距离，不受dt波动影响）
  const dx=loaderGroup.position.x-prevLoaderPos.x,dy=loaderGroup.position.y-prevLoaderPos.y,dz=loaderGroup.position.z-prevLoaderPos.z;
  const distMoved=Math.sqrt(dx*dx+dy*dy+dz*dz);
  wheels.forEach(w=>{w.rotation.y-=distMoved/0.35;});
  prevLoaderPos.set(loaderGroup.position.x,loaderGroup.position.y,loaderGroup.position.z);

  // 警示灯闪烁
  warnLightTimer+=dt;warnLightMat.emissiveIntensity=Math.sin(warnLightTimer*8)>0?1.5:0.1;

  // 工作灯跟随
  workLight.position.set(loaderTargetX,getLoaderY(loaderTargetX)+3,loaderTargetZ);
  contactShadow.position.set(loaderTargetX,getRoadSurfaceY(loaderTargetX)+0.02,loaderTargetZ);

  // 同步碎石（body → mesh，仅碎石，绝不涉及铲车）
  for(let i=0;i<rockCount;i++)syncMeshToBody(visualMeshes[i],physBodies[i]);
  for(let i=0;i<rockCount;i++){const b=physBodies[i];if(b.position.y<-4){b.position.set(-2+Math.random()*4,getRoadSurfaceY(-2+Math.random()*4)+1,(Math.random()-0.5)*4);b.velocity.set(0,0,0);b.angularVelocity.set(0,0,0);}const v=b.velocity,spd=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z);if(spd>15){const sc=15/spd;b.velocity.set(v.x*sc,v.y*sc,v.z*sc);}}

  // 粒子/排烟发射已禁用（提升帧率）

  // 相机控制（帧率无关的指数平滑）
  const camSmooth=1-Math.exp(-5*dt);
  const followSmooth=1-Math.exp(-8*dt);
  if(controlMode==='auto'){const cs=getCameraState(t);camera.position.lerp(cs.pos,camSmooth);camera.lookAt(cs.lookAt);controls.target.copy(cs.lookAt);}
  else{if(cameraPreset===2){_tmpVec.set(loaderTargetX,getLoaderY(loaderTargetX)+1,loaderTargetZ);controls.target.lerp(_tmpVec,followSmooth);}else if(cameraPreset===1){_tmpVec.set(loaderPosX,0,loaderPosZ);controls.target.lerp(_tmpVec,followSmooth);}controls.update();}
  updateUI(controlMode==='auto'?t:0);renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
updateModeUI();animate();
</script>
